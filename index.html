<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPT DNI – Lịch Công Việc CBQL Kỹ Thuật</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --orange: #f47820;
    --orange-dim: rgba(244,120,32,0.12);
    --orange-glow: rgba(244,120,32,0.35);
    --blue: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--orange);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(244,120,32,0.15);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .logo span { color: var(--orange); }
  .logo small { font-size: 11px; color: var(--text-dim); font-weight: 400; margin-left: 4px; }

  .header-right { display: flex; gap: 10px; align-items: center; }

  /* STATS BAR */
  .stats-bar {
    background: var(--surface2);
    padding: 10px 24px;
    display: flex;
    gap: 24px;
    border-bottom: 1px solid var(--border);
  }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-val { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-val.orange { color: var(--orange); }
  .stat-val.green { color: var(--green); }
  .stat-val.blue { color: var(--blue); }
  .stat-val.red { color: var(--red); }

  /* FILTER BAR */
  .filter-bar {
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--orange-dim);
    border-color: var(--orange);
    color: var(--orange);
  }
  .filter-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 120px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px;
  }
  .sidebar h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .today-focus {
    background: var(--orange-dim);
    border: 1px solid var(--orange-glow);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .today-focus .label {
    font-size: 10px;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }
  .focus-item {
    font-size: 12px;
    color: var(--text);
    padding: 4px 0;
    border-bottom: 1px solid rgba(244,120,32,0.15);
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .focus-item:last-child { border-bottom: none; }
  .focus-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); margin-top: 5px; flex-shrink: 0; }

  .sidebar-section { margin-bottom: 20px; }
  .progress-item { margin-bottom: 8px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }

  /* CONTENT */
  .content { padding: 20px 24px; }

  /* DAY COLUMN VIEW */
  .day-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .day-tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-dim);
    transition: all .2s;
  }
  .day-tab:hover { border-color: var(--orange); color: var(--orange); }
  .day-tab.active {
    background: var(--orange);
    color: #fff;
    border-color: var(--orange);
    font-weight: 600;
  }
  .day-tab .day-name { font-size: 13px; font-weight: 600; display: block; }
  .day-tab .day-count { font-size: 10px; margin-top: 2px; }

  /* TASK LIST */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
  }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge-orange { background: var(--orange-dim); color: var(--orange); }
  .badge-blue { background: rgba(88,166,255,0.12); color: var(--blue); }
  .badge-green { background: rgba(63,185,80,0.12); color: var(--green); }

  .task-group { margin-bottom: 20px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all .2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .task-card.urgency-daily::before { background: var(--orange); }
  .task-card.urgency-weekly::before { background: var(--blue); }
  .task-card.urgency-monthly::before { background: var(--green); }

  .task-card:hover {
    border-color: var(--orange);
    background: var(--surface2);
    transform: translateX(2px);
  }
  .task-card.done {
    opacity: .5;
    border-color: var(--border);
  }
  .task-card.done .task-title { text-decoration: line-through; }

  .task-check {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    margin-top: 1px;
  }
  .task-card.done .task-check {
    background: var(--green);
    border-color: var(--green);
  }
  .task-check-icon { font-size: 11px; color: #fff; display: none; }
  .task-card.done .task-check-icon { display: block; }

  .task-body { flex: 1; }
  .task-title { font-size: 13px; line-height: 1.45; margin-bottom: 6px; }
  .task-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag-type { background: rgba(88,166,255,0.1); color: var(--blue); }
  .tag-muctieu { background: rgba(63,185,80,0.1); color: var(--green); }
  .tag-canh-bao { background: rgba(248,81,73,0.12); color: var(--red); }

  .task-freq {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }

  /* ADD TASK */
  .add-task-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    padding: 10px 14px;
    border-radius: 8px;
    width: 100%;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    transition: all .2s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-task-btn:hover {
    border-color: var(--orange);
    color: var(--orange);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 500px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; color: var(--orange); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font);
  }
  .form-group textarea { min-height: 70px; resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--orange);
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .2s;
  }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-primary:hover { background: #d96e1a; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats-bar { gap: 12px; }
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .notification {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--green);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s;
    z-index: 300;
  }
  .notification.show { opacity: 1; transform: translateY(0); }

  .view-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .view-btn {
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--text-dim);
    transition: all .2s;
  }
  .view-btn.active { background: var(--orange); color: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#f47820"/>
      <text x="14" y="20" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="sans-serif">FPT</text>
    </svg>
    <div>
      <span>DNI</span> Task Manager
      <small>CBQL Kỹ Thuật</small>
    </div>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('list')">☰ Danh sách</button>
      <button class="view-btn" onclick="setView('week')">📅 Tuần</button>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Thêm việc</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">Tất cả</button>
  <button class="filter-btn" onclick="setFilter('pending',this)">⏳ Chưa xong</button>
  <button class="filter-btn" onclick="setFilter('done',this)">✅ Hoàn thành</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('daily',this)">🔴 Hằng ngày</button>
  <button class="filter-btn" onclick="setFilter('weekly',this)">🔵 Hằng tuần</button>
  <button class="filter-btn" onclick="setFilter('monthly',this)">🟢 Hằng tháng</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('xu-ly',this)">⚡ Xử lý</button>
  <button class="filter-btn" onclick="setFilter('ngan-ngua',this)">🛡️ Ngăn ngừa</button>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>➕ Thêm công việc mới</h2>
    <div class="form-group">
      <label>Tên công việc *</label>
      <textarea id="inp-title" placeholder="Mô tả nội dung công việc..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Tần suất</label>
        <select id="inp-freq">
          <option value="daily">Hằng ngày</option>
          <option value="weekly">Hằng tuần</option>
          <option value="monthly">Hằng tháng</option>
        </select>
      </div>
      <div class="form-group">
        <label>Loại</label>
        <select id="inp-type">
          <option value="xu-ly">Xử lý</option>
          <option value="ngan-ngua">Ngăn ngừa</option>
          <option value="ngan-ngua-xu-ly">Ngăn ngừa & Xử lý</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Mục tiêu</label>
      <input id="inp-muctieu" type="text" placeholder="VD: Kịp thời giữ chân KH...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="addTask()">Thêm</button>
    </div>
  </div>
</div>

<div class="notification" id="notif"></div>

<script>
const FREQ_LABEL = { daily:'Hằng ngày', weekly:'Hằng tuần', monthly:'Hằng tháng' };
const FREQ_ICON  = { daily:'🔴', weekly:'🔵', monthly:'🟢' };
const TYPE_LABEL = { 'xu-ly':'Xử lý','ngan-ngua':'Ngăn ngừa','ngan-ngua-xu-ly':'Ngăn ngừa & Xử lý' };

// Default tasks from image
const defaultTasks = [
  { id:1,  title:'Phân công KTV xuống liền ngay khi có ca vụ yc hủy, NKN — phối hợp DVKH liên trong ngày', freq:'daily', type:'xu-ly', muctieu:'Kịp thời giữ chân KH', done:false },
  { id:2,  title:'Hướng dẫn KTV dùng 7 đặc quyền KTV có care giữ chân KH', freq:'daily', type:'xu-ly', muctieu:'Kịp thời giữ chân KH', done:false },
  { id:3,  title:'Phân công KTV tăng cường phối hợp IBB bọc lót kịp thời tại địa bàn', freq:'daily', type:'xu-ly', muctieu:'Kịp thời giữ chân KH', done:false },
  { id:4,  title:'Yêu cầu KTV check đầu vào, kiểm soát chặt đầu vào đúng quy định lên HĐ', freq:'daily', type:'ngan-ngua', muctieu:'Ngăn ngừa triệt để HCKM, cheat KH', done:false },
  { id:5,  title:'TPKT & ĐT phân công mịn AU 900/DNI3, 4.5-1000/DNI2-1200/DNI1', freq:'weekly', type:'ngan-ngua', muctieu:'Bổ sung ngay nguồn lực thiếu hụt', done:false },
  { id:6,  title:'TPKT & ĐT rà soát việc KTV dùng tool Mỹ Bảo check lại ca vụ TK, BT', freq:'daily', type:'ngan-ngua', muctieu:'Xử lý dứt điểm ca vụ', done:false },
  { id:7,  title:'TPKT & ĐT đỡ ca vụ KTV cài đặt Hi FPT & tương tác Hi FPT cho KH', freq:'daily', type:'ngan-ngua', muctieu:'Tăng điểm chạm, giảm tái cv cho KTV & DVKH', done:false },
  { id:8,  title:'TPKT & Đội trưởng xem kĩ ca vụ BT T-1', freq:'daily', type:'ngan-ngua', muctieu:'Ngăn ngừa CLL, Csat', done:false },
  { id:9,  title:'TPKT & Đội trưởng xử lý dứt điểm các ca vụ Csat 1,2 , CLL 2,3', freq:'daily', type:'ngan-ngua', muctieu:'Ngăn ngừa RM', done:false },
  { id:10, title:'TPKT & Đội trưởng hằng tuần họp với các KTV có Csat 1,2 , CLL 2,3 cao để xem vấn đề', freq:'weekly', type:'ngan-ngua', muctieu:'Ngăn ngừa RM', done:false },
  { id:11, title:'TPKT & Đội trưởng họp với NS rời mạng cao xem vấn đề & nguyên nhân & giải pháp', freq:'monthly', type:'ngan-ngua', muctieu:'Ngăn ngừa RM', done:false },
  { id:12, title:'TPKT & Đội trưởng triển khai nhanh Repaid wifi, Trợ độc quyền', freq:'daily', type:'ngan-ngua', muctieu:'Tăng cường giữ chân, giảm RM', done:false },
  { id:13, title:'Truyền thông liên tục Kickoff Hủy cũ kí mới KTV, Trả trước, tiến độ chặng...', freq:'daily', type:'ngan-ngua', muctieu:'Tăng cường phối hợp giảm RM', done:false },
  { id:14, title:'CBQL, ĐT Onsite ít nhất 1-2 KH / Dây Trợ thuê / xuống địa bàn cùng ae / ngày', freq:'daily', type:'ngan-ngua-xu-ly', muctieu:'Tăng cường kết nối, am hiểu ca vụ, tình hình', done:false },
  { id:15, title:'Chủ động đề xuất ngay các PA cần thiết & Kịp thời', freq:'daily', type:'ngan-ngua-xu-ly', muctieu:'Xử lý & ngăn ngừa kịp thời', done:false },
];

let tasks = JSON.parse(localStorage.getItem('fpt_tasks') || 'null') || defaultTasks.map(t=>({...t}));
let nextId = Math.max(...tasks.map(t=>t.id)) + 1;
let currentFilter = 'all';
let currentView = 'list';

function save() { localStorage.setItem('fpt_tasks', JSON.stringify(tasks)); }

function filteredTasks() {
  return tasks.filter(t => {
    if (currentFilter === 'done') return t.done;
    if (currentFilter === 'pending') return !t.done;
    if (currentFilter === 'daily') return t.freq === 'daily';
    if (currentFilter === 'weekly') return t.freq === 'weekly';
    if (currentFilter === 'monthly') return t.freq === 'monthly';
    if (currentFilter === 'xu-ly') return t.type === 'xu-ly';
    if (currentFilter === 'ngan-ngua') return t.type.includes('ngan-ngua');
    return true;
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(v==='list'?'Danh':'Tuần')));
  render();
}

function toggleDone(id) {
  const t = tasks.find(x=>x.id===id);
  if(t) { t.done = !t.done; save(); render(); showNotif(t.done ? '✅ Hoàn thành!' : '↩ Đã hoàn tác'); }
}

function renderStats() {
  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const daily = tasks.filter(t=>t.freq==='daily'&&!t.done).length;
  const weekly = tasks.filter(t=>t.freq==='weekly'&&!t.done).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val orange">${total}</div><div class="stat-lbl">Tổng việc</div></div>
    <div class="stat"><div class="stat-val green">${done}</div><div class="stat-lbl">Hoàn thành</div></div>
    <div class="stat"><div class="stat-val red">${total-done}</div><div class="stat-lbl">Còn lại</div></div>
    <div class="stat"><div class="stat-val orange">${daily}</div><div class="stat-lbl">Hằng ngày</div></div>
    <div class="stat"><div class="stat-val blue">${weekly}</div><div class="stat-lbl">Hằng tuần</div></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <div style="font-size:11px;color:var(--text-dim)">Tiến độ hôm nay</div>
      <div style="width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="width:${total?Math.round(done/total*100):0}%;height:100%;background:var(--green);border-radius:4px;transition:width .4s"></div>
      </div>
      <div style="font-size:12px;color:var(--green);font-weight:600">${total?Math.round(done/total*100):0}%</div>
    </div>
  `;
}

function renderSidebar() {
  const today_daily = tasks.filter(t=>t.freq==='daily'&&!t.done);
  const byType = (tp) => tasks.filter(t=>t.type.includes(tp));
  const doneOfType = (tp) => tasks.filter(t=>t.type.includes(tp)&&t.done);

  document.getElementById('sidebar').innerHTML = `
    <div class="today-focus">
      <div class="label">🎯 Ưu tiên hôm nay</div>
      ${today_daily.slice(0,5).map(t=>`
        <div class="focus-item"><div class="focus-dot"></div><span>${t.title.length>55?t.title.slice(0,55)+'…':t.title}</span></div>
      `).join('')}
      ${today_daily.length > 5 ? `<div style="font-size:10px;color:var(--orange);margin-top:4px">+${today_daily.length-5} việc nữa</div>` : ''}
    </div>

    <div class="sidebar-section">
      <h3>📊 Theo loại</h3>
      <div class="progress-item">
        <div class="progress-label"><span>Xử lý</span><span>${doneOfType('xu-ly').length}/${byType('xu-ly').length}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${byType('xu-ly').length?Math.round(doneOfType('xu-ly').length/byType('xu-ly').length*100):0}%;background:var(--orange)"></div></div>
      </div>
      <div class="progress-item">
        <div class="progress-label"><span>Ngăn ngừa</span><span>${doneOfType('ngan-ngua').length}/${byType('ngan-ngua').length}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${byType('ngan-ngua').length?Math.round(doneOfType('ngan-ngua').length/byType('ngan-ngua').length*100):0}%;background:var(--blue)"></div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>📅 Theo tần suất</h3>
      ${['daily','weekly','monthly'].map(f => {
        const all = tasks.filter(t=>t.freq===f);
        const d = all.filter(t=>t.done);
        return `<div class="progress-item">
          <div class="progress-label"><span>${FREQ_ICON[f]} ${FREQ_LABEL[f]}</span><span>${d.length}/${all.length}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${all.length?Math.round(d.length/all.length*100):0}%;background:${f==='daily'?'var(--orange)':f==='weekly'?'var(--blue)':'var(--green)'}"></div></div>
        </div>`;
      }).join('')}
    </div>

    <button class="add-task-btn" onclick="openModal()">+ Thêm công việc</button>
  `;
}

function renderTaskCard(t) {
  return `
    <div class="task-card urgency-${t.freq} ${t.done?'done':''}" onclick="toggleDone(${t.id})">
      <div class="task-check">
        <span class="task-check-icon">✓</span>
      </div>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span class="tag tag-type">${TYPE_LABEL[t.type]||t.type}</span>
          ${t.muctieu ? `<span class="tag tag-muctieu">🎯 ${t.muctieu}</span>` : ''}
        </div>
      </div>
      <div class="task-freq">${FREQ_ICON[t.freq]} ${FREQ_LABEL[t.freq]}</div>
    </div>
  `;
}

function renderContent() {
  const ft = filteredTasks();
  if (currentView === 'list') {
    // Group by freq
    const groups = [
      { key:'daily', label:'🔴 Hằng ngày', tasks: ft.filter(t=>t.freq==='daily') },
      { key:'weekly', label:'🔵 Hằng tuần', tasks: ft.filter(t=>t.freq==='weekly') },
      { key:'monthly', label:'🟢 Hằng tháng', tasks: ft.filter(t=>t.freq==='monthly') },
    ].filter(g=>g.tasks.length>0);

    document.getElementById('content').innerHTML = groups.map(g=>`
      <div class="task-group">
        <div class="section-header">
          <span class="section-title">${g.label}</span>
          <span class="badge badge-${g.key==='daily'?'orange':g.key==='weekly'?'blue':'green'}">${g.tasks.filter(t=>!t.done).length} còn lại</span>
        </div>
        ${g.tasks.map(renderTaskCard).join('')}
      </div>
    `).join('') + (ft.length===0?'<div class="empty-state">Không có việc nào trong mục này 🎉</div>':'')
    + `<button class="add-task-btn" style="margin-top:8px" onclick="openModal()">+ Thêm công việc mới</button>`;
  } else {
    // Week view
    const days = ['T2','T3','T4','T5','T6','T7','CN'];
    const today = new Date().getDay(); // 0=sun
    const todayIdx = today===0?6:today-1;
    document.getElementById('content').innerHTML = `
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Việc hằng ngày lặp lại mỗi ngày trong tuần. Việc hằng tuần/tháng hiển thị theo lịch.</div>
        <div class="day-tabs">
          ${days.map((d,i)=>`<div class="day-tab ${i===todayIdx?'active':''}" onclick="selectDay(${i},this)">
            <span class="day-name">${d}</span>
            <span class="day-count">${ft.filter(t=>t.freq==='daily').length + (i===0||i===3?ft.filter(t=>t.freq==='weekly').length:0) + (i===0?ft.filter(t=>t.freq==='monthly').length:0)} việc</span>
          </div>`).join('')}
        </div>
      </div>
      <div id="dayContent"></div>
    `;
    renderDay(todayIdx, ft);
  }
}

function renderDay(idx, ft) {
  const dayTasks = ft.filter(t=>t.freq==='daily');
  const extraWeekly = (idx===0||idx===3) ? ft.filter(t=>t.freq==='weekly') : [];
  const extraMonthly = idx===0 ? ft.filter(t=>t.freq==='monthly') : [];
  const all = [...dayTasks, ...extraWeekly, ...extraMonthly];
  const el = document.getElementById('dayContent');
  if(!el) return;
  el.innerHTML = all.map(renderTaskCard).join('') + (all.length===0?'<div class="empty-state">Không có việc ngày này</div>':'');
}

function selectDay(i, btn) {
  document.querySelectorAll('.day-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDay(i, filteredTasks());
}

function render() {
  renderStats();
  renderSidebar();
  renderContent();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('inp-title').focus();
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function addTask() {
  const title = document.getElementById('inp-title').value.trim();
  if(!title) { showNotif('⚠️ Vui lòng nhập tên công việc', true); return; }
  tasks.push({
    id: nextId++,
    title,
    freq: document.getElementById('inp-freq').value,
    type: document.getElementById('inp-type').value,
    muctieu: document.getElementById('inp-muctieu').value.trim(),
    done: false
  });
  save(); render(); closeModal();
  document.getElementById('inp-title').value='';
  document.getElementById('inp-muctieu').value='';
  showNotif('✅ Đã thêm công việc!');
}

function showNotif(msg, warn=false) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.style.background = warn ? 'var(--yellow)' : 'var(--green)';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeModal();
});

render();
</script>
</body>
</html>
